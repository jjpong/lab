<body>

<div id="app-container">
    <div id="canvas-container">
        <div id="canvas-3d"></div>
        <canvas id="canvas-2d"></canvas>
        
        <div id="data-overlay" class="absolute top-4 left-1/2 transform -translate-x-1/2 flex gap-8 pointer-events-none z-20">
            <div id="data-obj1" class="bg-white/90 p-3 rounded shadow text-center hidden min-w-[120px]">
                <div class="font-bold text-blue-700 mb-1">物體 1</div>
                <div id="text-w1" class="text-sm text-gray-600">W = 0</div>
                <div id="text-p1" class="text-lg font-mono font-bold text-gray-800">P = 0</div>
            </div>
            <div id="data-obj2" class="bg-white/90 p-3 rounded shadow text-center hidden min-w-[120px]">
                <div class="font-bold text-red-700 mb-1">物體 2</div>
                <div id="text-w2" class="text-sm text-gray-600">W = 0</div>
                <div id="text-p2" class="text-lg font-mono font-bold text-gray-800">P = 0</div>
            </div>
        </div>
    </div>

    <div id="sidebar" class="flex flex-col p-5 gap-6">
        <h1 class="text-xl font-bold text-gray-800 text-center">固體壓力實驗</h1>

        <div>
            <div class="flex gap-2 mb-3">
                <button id="btn-view-3d" class="flex-1 py-1.5 rounded text-sm transition">3D 視角</button>
                <button id="btn-view-2d" class="flex-1 py-1.5 rounded text-sm transition">2D 剖面</button>
            </div>
            <div class="flex gap-2 mb-4">
                <button id="btn-unit-gw" class="flex-1 py-1.5 rounded text-sm transition">gw, cm²</button>
                <button id="btn-unit-pa" class="flex-1 py-1.5 rounded text-sm transition">N, Pa</button>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1 flex justify-between"><span>海綿硬度 (軟 ➔ 硬)</span></label>
                <input type="range" id="sponge-hardness" min="0.1" max="2" step="0.1" value="1" class="w-full">
            </div>
        </div>

        <div id="panel-container-1"></div>
        <div id="panel-container-2"></div>
    </div>
</div>

<script>
    const state = {
        view: '3d', unit: 'gw', spongeHardness: 1, spongeTension: 4,
        showObj1: true, showObj2: false,
        obj1: { 
            id: 1, type: 'frustum', weight: 500, density: 1.82, height: 5, topArea: 20, botArea: 100, invert: false, nails: 50, 
            lockW: false, lockD: false, lockH: false, lockTop: false, lockBot: false,
            colorLight: '#93c5fd', colorDark: '#1e3a8a'
        },
        obj2: { 
            id: 2, type: 'frustum', weight: 1000, density: 3.64, height: 5, topArea: 20, botArea: 100, invert: false, nails: 10, 
            lockW: false, lockD: false, lockH: false, lockTop: false, lockBot: false,
            colorLight: '#fca5a5', colorDark: '#7f1d1d'
        }
    };

    const NAIL_AREA = 0.5; 
    const SPONGE_TOP_Y = 4;

    function getVolume(obj) {
        if (obj.type === 'nails') return 4 * 4 * 1.0 + obj.nails * (Math.PI * Math.pow(0.05, 2) * 4);
        return (1/3) * obj.height * (obj.topArea + obj.botArea + Math.sqrt(obj.topArea * obj.botArea));
    }

    function isVolumeLocked(obj) {
        return obj.lockH && obj.lockTop && obj.lockBot;
    }

function forceVolume(obj, targetV, preferNotToTouch) {
    if (obj.type === 'nails') return;
    
    // 💡 設定主動變更時的預設順序：1.高度 ➔ 2.底部面積 ➔ 3.頂部面積
    let fields = ['height', 'botArea', 'topArea'];
    
    // 如果是拉動幾何滑桿觸發的，則把被拉動的欄位移到最後（維持前一版的防破功機制）
    if (preferNotToTouch) {
        fields = fields.filter(f => f !== preferNotToTouch);
        fields.push(preferNotToTouch);
    }
    
    for (let field of fields) {
        if (field === 'height' && !obj.lockH) {
            let base = obj.topArea + obj.botArea + Math.sqrt(obj.topArea * obj.botArea);
            obj.height = Math.max(5, Math.min(15, (3 * targetV) / base));
            if (Math.abs(getVolume(obj) - targetV) < 0.01) return; // 滿足目標體積就收工
        }
        else if (field === 'botArea' && !obj.lockBot) {
            let k = (3 * targetV) / obj.height;
            let At = obj.topArea;
            let disc = 4 * k - 3 * At;
            if (disc >= 0) {
                let x = (-Math.sqrt(At) + Math.sqrt(disc)) / 2;
                obj.botArea = Math.max(5, Math.min(100, x >= 0 ? x * x : 5));
            } else obj.botArea = 5;
            if (Math.abs(getVolume(obj) - targetV) < 0.01) return;
        }
        else if (field === 'topArea' && !obj.lockTop) {
            let k = (3 * targetV) / obj.height;
            let Ab = obj.botArea;
            let disc = 4 * k - 3 * Ab;
            if (disc >= 0) {
                let x = (-Math.sqrt(Ab) + Math.sqrt(disc)) / 2;
                obj.topArea = Math.max(5, Math.min(100, x >= 0 ? x * x : 5));
            } else obj.topArea = 5;
            if (Math.abs(getVolume(obj) - targetV) < 0.01) return;
        }
    }
}

    function handleLock(obj, field, isLocked) {
        obj[field] = isLocked;
        let vLocked = isVolumeLocked(obj);
        let lockedCount = (obj.lockW ? 1 : 0) + (obj.lockD ? 1 : 0) + (vLocked ? 1 : 0);
        
        if (lockedCount > 1) {
            if (field === 'lockW') { obj.lockD = false; if (vLocked) obj.lockH = false; }
            else if (field === 'lockD') { obj.lockW = false; if (vLocked) obj.lockH = false; }
            else { obj.lockW = false; obj.lockD = false; }
        }
        updateUI();
    }

function handleValueChange(obj, field, value) {
    // 記住變更前的絕對鎖定目標
    const prevWeight = obj.weight;
    const prevDensity = obj.density;

    // 先套用使用者的變更
    obj[field] = value;
    let V = getVolume(obj);

    if (field === 'weight') {
        if (obj.lockD) { 
            forceVolume(obj, obj.weight / obj.density, null); 
            V = getVolume(obj); 
            obj.weight = obj.density * V; 
        } else { 
            // 💡【核心修改】當主動調重量時的階梯式連動
            let reqD = obj.weight / V;
            if (reqD >= 0.1 && reqD <= 20) {
                // 密度在正常區間，直接線性改變密度
                obj.density = reqD;
            } else if (reqD > 20) {
                // 密度爆表了！強行卡在 20，並開始依序放大幾何形狀（高度 ➔ 底面 ➔ 頂面）
                obj.density = 20;
                const targetV = obj.weight / 20;
                forceVolume(obj, targetV, null); // 傳入 null 代表完全遵循預設順序
                
                V = getVolume(obj);
                obj.weight = obj.density * V; // 如果幾何也全部放大到極限了，重量才會真正頭頂頭（不再變大）
            } else if (reqD < 0.1) {
                // 重量調太低導致密度過小，強行卡在 0.1 並開始依序縮小幾何形狀
                obj.density = 0.1;
                const targetV = obj.weight / 0.1;
                forceVolume(obj, targetV, null);
                
                V = getVolume(obj);
                obj.weight = obj.density * V;
            }
        }
    } 
    else if (field === 'density') {
        if (obj.lockW) { 
            forceVolume(obj, obj.weight / obj.density, null); 
            V = getVolume(obj);
            obj.density = obj.weight / V; 
        } else { 
            obj.weight = obj.density * V; 
            if (obj.weight > 30000) { obj.weight = 30000; obj.density = obj.weight / V; }
            if (obj.weight < 50) { obj.weight = 50; obj.density = obj.weight / V; }
        }
    } 
    else if (['height', 'topArea', 'botArea'].includes(field)) {
        if (obj.lockW) { 
            let reqD = prevWeight / V;
            if (reqD >= 0.1 && reqD <= 20) {
                obj.density = reqD;
                obj.weight = prevWeight; 
            } else {
                obj.density = reqD > 20 ? 20 : 0.1;
                const targetV = prevWeight / obj.density;
                forceVolume(obj, targetV, field); 
                
                V = getVolume(obj);
                obj.weight = prevWeight; 
                obj.density = obj.weight / V; 
            }
        } else if (obj.lockD) { 
            let reqW = prevDensity * V;
            if (reqW >= 50 && reqW <= 30000) {
                obj.weight = reqW;
                obj.density = prevDensity;
            } else {
                obj.weight = reqW > 30000 ? 30000 : 50;
                const targetV = obj.weight / prevDensity;
                forceVolume(obj, targetV, field);
                
                V = getVolume(obj);
                obj.density = prevDensity; 
                obj.weight = obj.density * V;
            }
        } else { 
            obj.weight = obj.density * V; 
            if (obj.weight > 30000) { obj.weight = 30000; obj.density = obj.weight / V; }
            if (obj.weight < 50) { obj.weight = 50; obj.density = obj.weight / V; }
        }
    }
    updateUI();
}

    function calculatePhysics(obj) {
        let area = obj.type === 'nails' ? obj.nails * NAIL_AREA : (obj.invert ? obj.topArea : obj.botArea);
        let volume = getVolume(obj);
        let rVisual = obj.type === 'nails' ? (2 - (4 / (Math.ceil(Math.sqrt(obj.nails)) + 1)) + 0.1) : Math.sqrt(area / Math.PI) * 0.5;

        let pressureGW = obj.weight / area;
        let effectivePressure = pressureGW / state.spongeHardness;
        let depth = Math.min(7.5, 2.2 * Math.log10(1 + effectivePressure / 10));

        return { area, volume, density: obj.density, weightGW: obj.weight, weightN: obj.weight * 0.0098, pressureGW, pressurePa: pressureGW * 98.06, depth, rVisual };
    }

    function getDensityColor(objState, density) {
        let t = Math.max(0, Math.min(1, (density - 0.1) / 19.9));
        return new THREE.Color(objState.colorLight).lerp(new THREE.Color(objState.colorDark), t);
    }

    // ==========================================
    // ▼ 新增：廣播狀態到父層 (AI) 的函數 ▼
    // ==========================================
    function broadcastStateToParent(actionName, details = {}) {
        try {
            const p1 = calculatePhysics(state.obj1);
            const p2 = calculatePhysics(state.obj2);

            const formatW = (p) => state.unit === 'gw' ? `${p.weightGW.toFixed(0)} gw` : `${p.weightN.toFixed(2)} N`;
            const formatP = (p) => state.unit === 'gw' ? `${p.pressureGW.toFixed(1)} gw/cm²` : `${p.pressurePa.toFixed(0)} Pa`;

            const payload = {
                "學生最後的動作": actionName,
                "當前視角": state.view === '3d' ? '3D 視角' : '2D 剖面',
                "當前單位": state.unit === 'gw' ? 'gw, cm²' : 'N, Pa',
                "海綿硬度": state.spongeHardness,
                "物體1狀態": state.showObj1 ? `顯示 (類型:${state.obj1.type}, 重量:${formatW(p1)}, 壓力:${formatP(p1)}, 接觸面積:${p1.area.toFixed(1)} cm²)` : "隱藏",
                "物體2狀態": state.showObj2 ? `顯示 (類型:${state.obj2.type}, 重量:${formatW(p2)}, 壓力:${formatP(p2)}, 接觸面積:${p2.area.toFixed(1)} cm²)` : "隱藏",
                ...details
            };
            
            console.log("【廣播送到AI】", payload);
            window.parent.postMessage({ type: 'SIMULATION_STATE', payload: payload }, '*');
            
        } catch (e) { console.error("狀態廣播失敗:", e); }
    }
    // ==========================================

    // 初始化側邊欄 HTML（只執行一次，避免打斷拖曳）
    function initPanel(obj, containerId, title, colorClass, toggleId) {
        let html = `
        <div class="bg-${colorClass}-50 p-3 rounded-lg border border-${colorClass}-100">
            <label class="flex items-center font-bold text-${colorClass}-700 mb-2 cursor-pointer">
                <input type="checkbox" id="${toggleId}" class="mr-2 w-4 h-4 accent-${colorClass}-600"> 顯示${title}
            </label>
            
            <div id="panel-obj${obj.id}" class="space-y-3">
                <div class="flex justify-between items-center text-xs text-${colorClass}-800 mb-2">
                    <span>體積: <span id="obj${obj.id}-vol-text" class="font-mono font-bold"></span> cm³</span>
                </div>

                <select id="obj${obj.id}-type" class="w-full p-1.5 border rounded text-sm bg-white mb-2">
                    <option value="frustum">圓柱 / 圓錐台</option>
                    <option value="nails">劍山</option>
                </select>
                
                <div>
                    <label class="block text-sm text-gray-700 flex justify-between font-semibold mb-1">
                        <span>重量 (gw) <span id="obj${obj.id}-weight-text" class="text-blue-600"></span></span>
                        <label class="flex items-center text-xs text-gray-500"><input type="checkbox" id="obj${obj.id}-lockW" class="mr-1 lock-cb">鎖定</label>
                    </label>
                    <!-- 重量上限改為 30000 -->
                    <input type="range" id="obj${obj.id}-weight" min="50" max="30000" step="10" class="w-full">
                </div>

                <div>
                    <label class="block text-sm text-gray-700 flex justify-between font-semibold mb-1">
                        <span>密度 (g/cm³) <span id="obj${obj.id}-density-text" class="text-blue-600"></span></span>
                        <label class="flex items-center text-xs text-gray-500"><input type="checkbox" id="obj${obj.id}-lockD" class="mr-1 lock-cb">鎖定</label>
                    </label>
                    <input type="range" id="obj${obj.id}-density" min="0.1" max="20" step="0.1" class="w-full">
                </div>

                <div id="obj${obj.id}-frustum-settings" class="space-y-2 mt-2 border-t border-${colorClass}-200 pt-2">
                    <div>
                        <label class="block text-sm text-gray-600 flex justify-between mb-1">
                            <span>高度 (cm) <span id="obj${obj.id}-height-text"></span></span>
                            <label class="flex items-center text-xs text-gray-500"><input type="checkbox" id="obj${obj.id}-lockH" class="mr-1 lock-cb">鎖定</label>
                        </label>
                        <!-- 高度上限改為 15 -->
                        <input type="range" id="obj${obj.id}-height" min="5" max="15" step="0.5" class="w-full">
                    </div>
                    
                    <div class="flex gap-3">
                        <div class="flex-1">
                            <label class="block text-sm text-gray-600 flex justify-between mb-1">
                                <span>頂部 <span id="obj${obj.id}-top-text"></span></span>
                                <input type="checkbox" id="obj${obj.id}-lockTop" class="lock-cb" title="鎖定">
                            </label>
                            <input type="range" id="obj${obj.id}-top" min="5" max="100" step="5" class="w-full">
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm text-gray-600 flex justify-between mb-1">
                                <span>底部 <span id="obj${obj.id}-bot-text"></span></span>
                                <input type="checkbox" id="obj${obj.id}-lockBot" class="lock-cb" title="鎖定">
                            </label>
                            <input type="range" id="obj${obj.id}-bot" min="5" max="100" step="5" class="w-full">
                        </div>
                    </div>
                    
                    <label class="flex items-center text-sm text-gray-600 cursor-pointer pt-1">
                        <input type="checkbox" id="obj${obj.id}-invert" class="mr-2"> 倒置 (以上方面積接觸)
                    </label>
                </div>

                <div id="obj${obj.id}-nails-settings" class="mt-2 border-t border-${colorClass}-200 pt-2">
                    <div>
                        <label class="block text-sm text-gray-600 flex justify-between mb-1"><span>針的數目</span> <span id="obj${obj.id}-nails-text"></span></label>
                        <input type="range" id="obj${obj.id}-nails" min="1" max="100" step="1" class="w-full">
                    </div>
                </div>
            </div>
        </div>`;
        
        document.getElementById(containerId).innerHTML = html;

        // 綁定事件監聽器
        document.getElementById(toggleId).onchange = (e) => { 
            if(obj.id === 1) state.showObj1 = e.target.checked; 
            else state.showObj2 = e.target.checked; 
            updateUI(); 
            broadcastStateToParent(e.target.checked ? `顯示${title}` : `隱藏${title}`);
        };
        
        document.getElementById(`obj${obj.id}-type`).onchange = (e) => { 
            obj.type = e.target.value; updateUI(); 
            broadcastStateToParent(`更改 ${title} 類型為: ${e.target.value === 'frustum' ? '圓柱 / 圓錐台' : '劍山'}`);
        };
        document.getElementById(`obj${obj.id}-invert`).addEventListener('change', (e) => { 
            obj.invert = e.target.checked; updateUI(); 
            broadcastStateToParent(`${title} ${e.target.checked ? '設定為倒置' : '取消倒置'}`);
        });
        
        ['weight', 'density', 'height', 'top', 'bot', 'nails'].forEach(field => {
            let el = document.getElementById(`obj${obj.id}-${field}`);
            if (el) {
                el.oninput = (e) => {
                    let val = parseFloat(e.target.value);
                    let stateField = field === 'top' ? 'topArea' : (field === 'bot' ? 'botArea' : field);
                    handleValueChange(obj, stateField, val);
                };
                el.addEventListener('change', (e) => {
                    broadcastStateToParent(`調整 ${title} 的 ${field} 參數為: ${e.target.value}`);
                });
            }
        });

        ['W', 'D', 'H', 'Top', 'Bot'].forEach(field => {
            let el = document.getElementById(`obj${obj.id}-lock${field}`);
            if (el) el.onchange = (e) => {
                handleLock(obj, `lock${field}`, e.target.checked);
                broadcastStateToParent(`${e.target.checked ? '鎖定' : '解鎖'} ${title} 的 ${field}`);
            };
        });
    }

    // 僅更新數值與狀態，不重新生成 HTML
    function syncPanel(obj, toggleId) {
        const isShow = obj.id === 1 ? state.showObj1 : state.showObj2;
        document.getElementById(toggleId).checked = isShow;
        document.getElementById(`panel-obj${obj.id}`).style.display = isShow ? 'block' : 'none';
        
        const V = getVolume(obj);
        document.getElementById(`obj${obj.id}-vol-text`).innerText = V.toFixed(1);
        
        document.getElementById(`obj${obj.id}-type`).value = obj.type;
        document.getElementById(`obj${obj.id}-frustum-settings`).style.display = obj.type === 'frustum' ? 'block' : 'none';
        document.getElementById(`obj${obj.id}-nails-settings`).style.display = obj.type === 'nails' ? 'block' : 'none';

        // 更新文字
        document.getElementById(`obj${obj.id}-weight-text`).innerText = obj.weight.toFixed(0);
        document.getElementById(`obj${obj.id}-density-text`).innerText = obj.density.toFixed(2);
        document.getElementById(`obj${obj.id}-height-text`).innerText = obj.height.toFixed(1);
        document.getElementById(`obj${obj.id}-top-text`).innerText = obj.topArea.toFixed(0);
        document.getElementById(`obj${obj.id}-bot-text`).innerText = obj.botArea.toFixed(0);
        document.getElementById(`obj${obj.id}-nails-text`).innerText = obj.nails;

        // 更新滑桿數值
        document.getElementById(`obj${obj.id}-weight`).value = obj.weight;
        document.getElementById(`obj${obj.id}-density`).value = obj.density;
        document.getElementById(`obj${obj.id}-height`).value = obj.height;
        document.getElementById(`obj${obj.id}-top`).value = obj.topArea;
        document.getElementById(`obj${obj.id}-bot`).value = obj.botArea;
        document.getElementById(`obj${obj.id}-nails`).value = obj.nails;

        // 更新鎖定狀態
        document.getElementById(`obj${obj.id}-lockW`).checked = obj.lockW;
        document.getElementById(`obj${obj.id}-lockD`).checked = obj.lockD;
        document.getElementById(`obj${obj.id}-lockH`).checked = obj.lockH;
        document.getElementById(`obj${obj.id}-lockTop`).checked = obj.lockTop;
        document.getElementById(`obj${obj.id}-lockBot`).checked = obj.lockBot;
        document.getElementById(`obj${obj.id}-invert`).checked = obj.invert;
    }

    function updateUI() {
        const btnActive = 'flex-1 py-1.5 bg-indigo-600 text-white rounded text-sm transition';
        const btnInactive = 'flex-1 py-1.5 bg-gray-200 text-gray-700 rounded text-sm transition';
        const btnUnitActive = 'flex-1 py-1.5 bg-green-600 text-white rounded text-sm transition';
        
        document.getElementById('btn-view-3d').className = state.view === '3d' ? btnActive : btnInactive;
        document.getElementById('btn-view-2d').className = state.view === '2d' ? btnActive : btnInactive;
        document.getElementById('btn-unit-gw').className = state.unit === 'gw' ? btnUnitActive : btnInactive;
        document.getElementById('btn-unit-pa').className = state.unit === 'pa' ? btnUnitActive : btnInactive;

        document.getElementById('canvas-3d').style.display = state.view === '3d' ? 'block' : 'none';
        document.getElementById('canvas-2d').style.display = state.view === '2d' ? 'block' : 'none';

        // 同步兩個面板的數值
        syncPanel(state.obj1, 'toggle-obj1');
        syncPanel(state.obj2, 'toggle-obj2');

        const p1 = calculatePhysics(state.obj1);
        const p2 = calculatePhysics(state.obj2);

        document.getElementById('data-obj1').style.display = state.showObj1 ? 'block' : 'none';
        document.getElementById('data-obj2').style.display = state.showObj2 ? 'block' : 'none';

        const formatW = (p) => state.unit === 'gw' ? `${p.weightGW.toFixed(0)} gw` : `${p.weightN.toFixed(2)} N`;
        const formatP = (p) => state.unit === 'gw' ? `${p.pressureGW.toFixed(1)} gw/cm²` : `${p.pressurePa.toFixed(0)} Pa`;
        
        document.getElementById('text-w1').innerText = `W = ${formatW(p1)}`;
        document.getElementById('text-p1').innerText = `P = ${formatP(p1)}`;
        document.getElementById('text-w2').innerText = `W = ${formatW(p2)}`;
        document.getElementById('text-p2').innerText = `P = ${formatP(p2)}`;

        renderScene();
    }

    // 初始化事件
    document.getElementById('btn-view-3d').onclick = () => { state.view = '3d'; updateUI(); broadcastStateToParent("切換為 3D 視角"); };
    document.getElementById('btn-view-2d').onclick = () => { state.view = '2d'; updateUI(); broadcastStateToParent("切換為 2D 剖面"); };
    document.getElementById('btn-unit-gw').onclick = () => { state.unit = 'gw'; updateUI(); broadcastStateToParent("切換單位為 gw, cm²"); };
    document.getElementById('btn-unit-pa').onclick = () => { state.unit = 'pa'; updateUI(); broadcastStateToParent("切換單位為 N, Pa"); };
    
    const spongeSlider = document.getElementById('sponge-hardness');
    spongeSlider.oninput = (e) => { state.spongeHardness = parseFloat(e.target.value); updateUI(); };
    spongeSlider.addEventListener('change', (e) => { broadcastStateToParent(`調整海綿硬度為: ${e.target.value}`); });

    // 初始化側邊欄
    initPanel(state.obj1, 'panel-container-1', '物體 1', 'blue', 'toggle-obj1');
    initPanel(state.obj2, 'panel-container-2', '物體 2', 'red', 'toggle-obj2');

    // Three.js 與 Canvas2D 設定
    const container = document.getElementById('canvas-container');
    const container3D = document.getElementById('canvas-3d');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf3f4f6);
    
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 18, 28);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container3D.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enableZoom = false; 
    controls.maxPolarAngle = Math.PI / 2 - 0.05;
    controls.target.set(0, 2, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(15, 25, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    const spongeGeo = new THREE.BoxGeometry(30, 8, 20, 120, 1, 80);
    spongeGeo.userData.basePositions = new Float32Array(spongeGeo.attributes.position.array);
    const spongeMat = new THREE.MeshStandardMaterial({ color: 0xeab308, roughness: 0.9, metalness: 0.05 });
    const sponge = new THREE.Mesh(spongeGeo, spongeMat);
    sponge.receiveShadow = true;
    sponge.castShadow = true;
    scene.add(sponge);

    let objects3D = [];

    function create3DObject(objState, posX, physics) {
        const group = new THREE.Group();
        group.position.x = posX;
        group.position.y = SPONGE_TOP_Y - physics.depth; 

        const objColor = getDensityColor(objState, physics.density);
        const mat = new THREE.MeshStandardMaterial({ color: objColor, roughness: 0.3, metalness: 0.2 });

        if (objState.type === 'frustum') {
            const rTop = Math.sqrt(objState.topArea / Math.PI) * 0.5;
            const rBot = Math.sqrt(objState.botArea / Math.PI) * 0.5;
            const r1 = objState.invert ? rBot : rTop;
            const r2 = objState.invert ? rTop : rBot; 
            
            const geo = new THREE.CylinderGeometry(r1, r2, objState.height, 32);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = objState.height / 2; 
            mesh.castShadow = true; mesh.receiveShadow = true;
            group.add(mesh);
        } else {
            const baseSize = 4;
            const base = new THREE.Mesh(new THREE.BoxGeometry(baseSize, 1.0, baseSize), mat);
            base.position.y = 4.5; 
            base.castShadow = true; base.receiveShadow = true;
            group.add(base);

            const cols = Math.ceil(Math.sqrt(objState.nails));
            const spacing = baseSize / (cols + 1);
            let count = 0;
            const nailGeo = new THREE.CylinderGeometry(0.05, 0.05, 4, 8); 
            const nailMat = new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.5, metalness: 0.8 });
            
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < cols; j++) {
                    if (count >= objState.nails) break;
                    const nail = new THREE.Mesh(nailGeo, nailMat);
                    nail.position.set(-baseSize/2 + (i+1)*spacing, 2, -baseSize/2 + (j+1)*spacing);
                    nail.castShadow = true; nail.receiveShadow = true;
                    group.add(nail);
                    count++;
                }
            }
        }
        scene.add(group);
        objects3D.push(group);
    }

    function getDentOffset(distance, physics) {
        const rFlat = physics.rVisual; 
        const rFalloff = state.spongeTension * (1.0 + rFlat * 0.3); 
        if (distance <= rFlat) return -physics.depth;
        else if (distance < rFlat + rFalloff) {
            const ratio = (distance - rFlat) / rFalloff;
            return -physics.depth * ((Math.cos(ratio * Math.PI) + 1) / 2);
        }
        return 0;
    }

    function deformSponge(p1, p2, pos1, pos2) {
        const positions = spongeGeo.attributes.position;
        const base = spongeGeo.userData.basePositions;

        for (let i = 0; i < positions.count; i++) {
            let x = base[i * 3], y = base[i * 3 + 1], z = base[i * 3 + 2];
            if (y > 3.9) {
                let dy = 0;
                if (state.showObj1) dy += getDentOffset(Math.sqrt(Math.pow(x - pos1, 2) + Math.pow(z, 2)), p1);
                if (state.showObj2) dy += getDentOffset(Math.sqrt(Math.pow(x - pos2, 2) + Math.pow(z, 2)), p2);
                positions.setY(i, y + dy);
            } else {
                positions.setY(i, y);
            }
        }
        positions.needsUpdate = true;
        spongeGeo.computeVertexNormals(); 
    }

    const canvas2D = document.getElementById('canvas-2d');
    const ctx = canvas2D.getContext('2d');

    function draw2DScene(p1, p2, pos1, pos2) {
        const w = canvas2D.width, h = canvas2D.height;
        ctx.clearRect(0, 0, w, h);

        const groundY = h * 0.5, scale = 25, points = [];
        for (let x = 0; x <= w; x += 2) {
            let dy = 0;
            const simX = (x - w/2) / scale; 
            if (state.showObj1) dy += getDentOffset(Math.abs(simX - pos1), p1); 
            if (state.showObj2) dy += getDentOffset(Math.abs(simX - pos2), p2);
            points.push({x: x, y: groundY - dy * scale});
        }

        ctx.fillStyle = '#eab308';
        ctx.beginPath();
        ctx.moveTo(0, h); ctx.lineTo(0, points[0].y);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(w, points[points.length - 1].y); ctx.lineTo(w, h);
        ctx.closePath(); ctx.fill();

        ctx.strokeStyle = '#d97706'; ctx.lineWidth = 3;
        ctx.beginPath();
        points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();

        function drawObject2D(objState, simX, physics) {
            const cx = w/2 + simX * scale;
            const cy = groundY - getDentOffset(0, physics) * scale; 
            const objColor = getDensityColor(objState, physics.density);
            
            ctx.fillStyle = `#${objColor.getHexString()}`;
            ctx.strokeStyle = '#1f2937'; ctx.lineWidth = 2;
            
            if (objState.type === 'frustum') {
                const rTop = Math.sqrt(objState.topArea / Math.PI) * 0.5 * scale;
                const rBot = Math.sqrt(objState.botArea / Math.PI) * 0.5 * scale;
                const r1 = objState.invert ? rBot : rTop;
                const r2 = objState.invert ? rTop : rBot;
                const height = objState.height * scale;

                ctx.beginPath();
                ctx.moveTo(cx - r2, cy); ctx.lineTo(cx + r2, cy);
                ctx.lineTo(cx + r1, cy - height); ctx.lineTo(cx - r1, cy - height);
                ctx.closePath(); ctx.fill(); ctx.stroke();
            } else {
                const baseW = 4 * scale, baseH = 1.0 * scale, needleH = 4 * scale; 
                ctx.fillStyle = '#9ca3af';
                const cols = Math.min(15, Math.ceil(Math.sqrt(objState.nails))); 
                const spacing = baseW / (cols + 1);
                for(let i=1; i<=cols; i++) ctx.fillRect(cx - baseW/2 + i*spacing - 2, cy - needleH, 4, needleH);
                
                ctx.fillStyle = `#${objColor.getHexString()}`;
                ctx.fillRect(cx - baseW/2, cy - needleH - baseH, baseW, baseH);
                ctx.strokeRect(cx - baseW/2, cy - needleH - baseH, baseW, baseH);
            }
        }

        if (state.showObj1) drawObject2D(state.obj1, pos1, p1);
        if (state.showObj2) drawObject2D(state.obj2, pos2, p2);
    }

    function renderScene() {
        const p1 = calculatePhysics(state.obj1);
        const p2 = calculatePhysics(state.obj2);

        let pos1 = 0, pos2 = 0;
        if (state.showObj1 && state.showObj2) { pos1 = -7.5; pos2 = 7.5; }

        if (state.view === '3d') {
            objects3D.forEach(obj => scene.remove(obj));
            objects3D = [];
            if (state.showObj1) create3DObject(state.obj1, pos1, p1);
            if (state.showObj2) create3DObject(state.obj2, pos2, p2);
            deformSponge(p1, p2, pos1, pos2);
        } else {
            canvas2D.width = container.clientWidth;
            canvas2D.height = container.clientHeight;
            draw2DScene(p1, p2, pos1, pos2);
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        if (state.view === '3d') {
            controls.update();
            renderer.render(scene, camera);
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        if (state.view === '2d') {
            canvas2D.width = container.clientWidth;
            canvas2D.height = container.clientHeight;
            renderScene();
        }
    });

    // 首次啟動更新
    updateUI();
    animate();

    window.onload = () => {
        const introMsg = `【系統開場白】歡迎進入「固體壓力虛擬實驗」！\n這是一個可以探索物體重量、接觸面積與產生壓力之間關係的模擬環境。\n主要功能包含：\n改變海綿硬度、切換 3D/2D 視角與顯示單位。\n可新增最多兩個物體進行對照實驗。\n可以改變物體的重量、密度、高度、上下底面積，甚至替換成劍山（改變接觸面積）。\n學生可以透過這些功能來驗證壓力 P = F / A 的關係！`;
        setTimeout(() => broadcastStateToParent(introMsg), 500);
    };

</script>

</body></html>
