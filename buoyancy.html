<!DOCTYPE html><html lang="zh-Hant"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浮力與壓力互動實驗室</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
    background: #0f172a; color: #e2e8f0; overflow: hidden;
  }
  .app { display: flex; flex-wrap: wrap; height: 100vh; }

  .panel {
    width: 350px; flex-shrink: 0; padding: 16px; background: #1e293b;
    overflow-y: auto; height: 100vh; border-right: 1px solid #334155;
  }
  .panel.collapsed { display: none; }
  h1 { font-size: 18px; margin: 0 0 4px; color: #f8fafc; }
  .group {
    background: #0f172a; border: 1px solid #334155; border-radius: 10px;
    padding: 10px 12px; margin-bottom: 12px;
  }
  .group h2 { font-size: 13px; margin: 0 0 8px; color: #7dd3fc; letter-spacing: .5px; }
  .row { margin-bottom: 9px; }
  .row label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
  .row .val { color: #fbbf24; font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; accent-color: #38bdf8; cursor: pointer; }
  .checks label, .shape label {
    display: flex; align-items: center; gap: 6px; font-size: 13px;
    padding: 4px 0; cursor: pointer;
  }
  .shape { display: flex; gap: 14px; }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 6px; font-size: 11px; }

  .chart-pane.popout {
    position: fixed !important;
    z-index: 9999 !important;
    width: 550px;
    height: 450px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4), 0 10px 10px -5px rgba(0,0,0,0.3);
    border: 2px solid #8b5cf6;
    border-radius: 12px;
    background: #fff;
    resize: both;
  }
  .chart-pane.popout .pane-toolbar {
    cursor: move;
    background: #c084fc;
    color: #fff;
  }

  .preset-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .preset-btns button {
    background: #334155; color: #cbd5e1; border: 1px solid #475569;
    border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer;
    transition: all 0.2s; font-weight: bold;
  }
  .preset-btns button:hover { background: #475569; color: #fff; }

  .btn {
    width: 100%; padding: 9px; border: none; border-radius: 8px; cursor: pointer;
    background: #38bdf8; color: #0f172a; font-weight: bold; font-size: 13px; transition: 0.2s;
  }
  .btn:hover { background: #0ea5e9; }
  .hint { font-size: 11px; color: #64748b; margin-top: 6px; }

  .collapse-btn {
    width: 100%; padding: 8px; margin-bottom: 12px;
    border: 1px solid #334155; border-radius: 8px;
    background: #334155; color: #e2e8f0; cursor: pointer; font-size: 13px;
  }
  .collapse-btn:hover { background: #475569; }
  #panelShow {
    position: fixed; top: 12px; left: 12px; z-index: 30; display: none;
    padding: 8px 14px; border: 1px solid #334155; border-radius: 8px;
    background: #1e293b; color: #e2e8f0; cursor: pointer; font-size: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,.35);
  }

  .stage { flex: 1; min-width: 320px; padding: 0; display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
  .canvas-container {
    flex: 1; display: flex; flex-direction: column; height: 100vh; padding: 16px; gap: 12px; overflow: hidden;
  }
  .canvas-wrap {
    position: relative; flex: 1; width: 100%;
    display: flex; background: #f8fafc; border-radius: 12px; overflow: hidden; box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
  }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; }

  #statusOverlay {
    position: absolute; top: 12px; left: 12px;
    background: rgba(15,23,42,.8); color: #f1f5f9;
    padding: 12px 16px; border-radius: 10px;
    font-size: 13px; line-height: 1.8; min-width: 180px;
    backdrop-filter: blur(4px); box-shadow: 0 4px 14px rgba(0,0,0,.3);
    pointer-events: none; z-index: 10;
  }
  #statusOverlay.hidden { display: none; }
  #statusOverlay .line { display: flex; justify-content: space-between; gap: 16px; }
  #statusOverlay b { color: #fbbf24; font-variant-numeric: tabular-nums; }
  #statusOverlay .state-tag { color: #a78bfa; }

  #btnToggleLogbook {
    background: #cbd5e1; color: #1e293b; border: 1px solid #94a3b8;
    padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;
    transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-shrink: 0;
  }
  #btnToggleLogbook:hover { background: #94a3b8; color: #fff; }

  .logbook-panel {
    width: 480px; flex-shrink: 0; height: 100vh; background: #fff; border-left: 1px solid #cbd5e1;
    display: none;
    flex-direction: column; gap: 12px; padding: 16px; color: #1e293b; overflow-y: auto;
  }
  .logbook-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; flex-shrink: 0; }
  .logbook-header h3 { margin: 0; font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
  .logbook-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap;}
  .logbook-actions input[type="text"] {
    padding: 6px 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 12px; width: 120px; font-weight: bold;
  }
  .logbook-actions button {
    background: #f1f5f9; border: 1px solid #cbd5e1; color: #334155;
    padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
  }
  .logbook-actions button:hover { background: #e2e8f0; }
  #btnRecord { background: #38bdf8; color: #0f172a; border-color: #0ea5e9; }
  #btnRecord:hover { background: #0ea5e9; color: #fff; }
  #btnExport { background: #10b981; color: #fff; border-color: #059669; }
  #btnExport:hover { background: #059669; }

  .logbook-settings { font-size: 12px; background: #f8fafc; padding: 8px 10px; border-radius: 8px; border: 1px solid #e2e8f0; flex-shrink: 0; }
  .check-item { display: inline-flex; align-items: center; gap: 4px; margin-right: 12px; margin-bottom: 4px; cursor: pointer; }
  .check-item input { accent-color: #38bdf8; cursor: pointer; }

  #logbookMainArea {
    display: flex; flex-direction: column; flex-shrink: 0; gap: 0;
  }
  .table-pane, .chart-pane {
    display: flex; flex-direction: column; border: 1px solid #e2e8f0; border-radius: 8px;
    background: #fff; overflow: hidden;
  }
  .pane-toolbar {
    background: #f1f5f9; padding: 6px 12px; display: flex; justify-content: space-between;
    align-items: center; border-bottom: 1px solid #cbd5e1; font-size: 13px; font-weight: bold; color: #475569;
    flex-shrink: 0;
  }
  .table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; }
  th { position: sticky; top: 0; background: #f1f5f9; padding: 8px; border-bottom: 2px solid #cbd5e1; color: #475569; font-weight: bold; white-space: nowrap;}
  td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; font-variant-numeric: tabular-nums; white-space: nowrap; }
  tr:hover { background: #f8fafc; }
  .del-btn { background: #fee2e2; color: #ef4444; border: 1px solid #fca5a5; border-radius: 4px; cursor: pointer; padding: 2px 6px; font-size: 11px; font-weight: bold; }
  .del-btn:hover { background: #fecaca; }

  .pane-resizer-vertical-custom {
    height: 12px; background-color: transparent; cursor: row-resize; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: 0.2s;
  }
  .pane-resizer-vertical-custom::after {
    content: ""; display: block; height: 4px; width: 32px; background: #cbd5e1; border-radius: 2px; transition: 0.2s;
  }
  .pane-resizer-vertical-custom:hover::after, .pane-resizer-vertical-custom.active::after { background: #38bdf8; width: 48px; }

  .chart-pane { min-height: 250px; }
  .chart-wrap { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow: auto; }
  .chart-controls { display: flex; gap: 8px; margin-bottom: 8px; font-size: 12px; font-weight: bold; align-items: center; flex-wrap: wrap;}
  .chart-controls select { padding: 4px 6px; border-radius: 4px; border: 1px solid #cbd5e1; outline: none; font-weight: bold; color: #1e293b; }
  #btnDrawChart { background: #8b5cf6; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
  #btnDrawChart:hover { background: #7c3aed; }
  .chart-canvas-container { flex: 1; position: relative; min-height: 180px; }

  .logbook-report {
    margin-top: 12px; display: flex; flex-direction: column; flex-shrink: 0;
  }
  .logbook-report textarea {
    width: 100%; height: 90px; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1;
    resize: vertical;
    font-size: 13px; font-family: inherit; min-height: 60px;
  }
  .logbook-report textarea:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
</style>
</head>
<body>
<div class="app">
  <button id="panelShow">☰ 開啟選單</button>

  <div class="panel">
    <button class="collapse-btn" id="panelHide">« 收合選單</button>

    <h1>浮力與壓力互動實驗室</h1>

    <div class="group">
      <h2>物體性質 (自動連動物理限制)</h2>
      <div class="shape">
        <label><input type="radio" name="shape" value="circle"> 圓形</label>
        <label><input type="radio" name="shape" value="square" checked> 方形</label>
      </div>
      <div class="row" style="margin-top: 10px;">
        <label>密度 <span class="val" id="dVal"></span></label>
        <input type="range" id="density" min="0.1" max="20.0" step="0.1" value="0.6">
      </div>
      <div class="preset-btns">
        <button class="obj-btn" data-rho="0.6">木塊(0.6)</button>
        <button class="obj-btn" data-rho="2.7">鋁塊(2.7)</button>
        <button class="obj-btn" data-rho="7.8">鐵塊(7.8)</button>
        <button class="obj-btn" data-rho="19.3">金塊(19.3)</button>
      </div>

      <div class="row" style="margin-top: 12px;">
        <label>體積 <span class="val" id="aVal"></span></label>
        <input type="range" id="area" min="5" max="50" step="1" value="30">
      </div>
      <div class="row">
        <label>質量 <span class="val" id="mVal"></span></label>
        <input type="range" id="mass" min="0.5" max="1000" step="0.5" value="18">
      </div>
    </div>

    <div class="group">
      <h2>液體設定</h2>
      <div class="row">
        <label>液體密度 <span class="val" id="lVal"></span></label>
        <input type="range" id="liquid" min="0.4" max="15.0" step="0.05" value="1.0">
      </div>
      <div class="preset-btns">
        <button class="liq-btn" data-rho="0.79">酒精(0.79)</button>
        <button class="liq-btn" data-rho="0.90">食用油(0.9)</button>
        <button class="liq-btn" data-rho="1.00">水(1.0)</button>
        <button class="liq-btn" data-rho="1.26">甘油(1.26)</button>
        <button class="liq-btn" data-rho="13.6">水銀(13.6)</button>
      </div>
    </div>

    <div class="group">
      <h2>力的箭頭顯示</h2>
      <div class="checks">
        <label><input type="checkbox" id="showForce">
          顯示 <span class="badge" style="background:#ef4444">重力</span>
          與 <span class="badge" style="background:#3b82f6">浮力</span></label>
      </div>
      <div class="row" style="margin-top:6px">
        <label>力箭頭比例 <span class="val" id="fsVal"></span></label>
        <input type="range" id="forceScale" min="0.1" max="3" step="0.05" value="1">
      </div>
    </div>

    <div class="group">
      <h2>液體壓力箭頭</h2>
      <div class="checks">
        <label><input type="checkbox" id="showObjP"> 顯示對<b style="color:#14b8a6">&nbsp;物體&nbsp;</b>的壓力</label>
        <label><input type="checkbox" id="showWallP"> 顯示對<b style="color:#f97316">&nbsp;器壁&nbsp;</b>的壓力</label>
      </div>
      <div class="row" style="margin-top:6px">
        <label>壓力箭頭比例 <span class="val" id="psVal"></span></label>
        <input type="range" id="pScale" min="0.2" max="6" step="0.1" value="2.5">
      </div>
      <div class="row">
        <label>箭頭密度<span class="val" id="pdVal"></span></label>
        <input type="range" id="pDensity" min="0.3" max="3" step="0.1" value="1">
      </div>
    </div>

    <div class="group">
      <h2>狀態欄 (實驗區浮層)</h2>
      <div class="hint" style="margin-top:0;margin-bottom:6px">勾選才會在實驗區顯示（預設全隱藏）。</div>
      <div class="checks">
        <label><input type="checkbox" data-line="lineState"> 狀態 (漂浮/沉底)</label>
        <label><input type="checkbox" data-line="lineDepth"> 底面深度 (cm)</label>
        <label><input type="checkbox" data-line="lineSub"> 沒入比例</label>
        <label><input type="checkbox" data-line="lineW"> 重力</label>
        <label><input type="checkbox" data-line="lineB"> 浮力</label>
        <label><input type="checkbox" data-line="lineDisp"> 排開液體體積</label>
        <label><input type="checkbox" data-line="lineDispW"> 排開液體重量</label>
        <label><input type="checkbox" data-line="lineWH"> 水位刻度</label>
      </div>
    </div>

    <div class="group">
      <h2>其他設定</h2>
      <div class="checks">
        <label><input type="checkbox" id="fixPos"> ⚓ 固定物體位置（拖到哪停在哪）</label>
      </div>
      <div class="row" style="margin-top:6px">
        <label>畫面縮放 (scale) <span class="val" id="vsVal"></span></label>
        <input type="range" id="viewScale" min="0.6" max="1.8" step="0.05" value="1.1">
      </div>
      <button class="btn" id="reset" style="margin-top: 8px;">重設位置</button>
    </div>
  </div>

  <div class="stage" id="stageContainer">

    <div class="canvas-container">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="cv"></canvas>
        <div id="statusOverlay" class="hidden">
          <div class="line" id="lineState">狀態：<span class="state-tag" id="rState">—</span></div>
          <div class="line" id="lineDepth">底面深度：<span><b id="rDepth">0</b> cm</span></div>
          <div class="line" id="lineSub">沒入比例：<span><b id="rSub">0</b> %</span></div>
          <div class="line" id="lineW">重力：<span><b id="rW">0</b> gw</span></div>
          <div class="line" id="lineB">浮力：<span><b id="rB">0</b> gw</span></div>
          <div class="line" id="lineDisp">排開體積：<span><b id="rDisp">0</b> cm³</span></div>
          <div class="line" id="lineDispW">排開液重：<span><b id="rDispW">0</b> gw</span></div>
          <div class="line" id="lineWH">總水量：<span><b id="rWH">0</b> ml</span></div>
        </div>
      </div>
      <button id="btnToggleLogbook">📊 打開實驗記錄簿 ▶</button>
    </div>

    <div class="logbook-panel" id="logbookPanel">
      <div class="logbook-header">
        <h3>📋 實驗記錄簿</h3>
        <div class="logbook-actions">
          <input type="text" id="groupInput" placeholder="自訂組別 (例:水)">
          <button id="btnRecord">➕ 紀錄當下數據</button>
          <button id="btnClear">🗑️ 清空</button>
          <button id="btnExport">💾 下載 CSV</button>
        </div>
      </div>

      <div class="logbook-settings">
        <span style="font-weight: bold; color: #475569; margin-bottom: 4px; display: block;">☑ 勾選要顯示在「表格」且可作圖的資料欄位：</span>
        <div id="colCheckboxes"></div>
      </div>

      <div id="logbookMainArea">

        <div class="table-pane" id="tablePane" style="height: 200px; display: flex; flex-direction: column; flex-shrink: 0;">
          <div class="pane-toolbar">
            <span>📋 實驗數據 (數據過多時可上下捲動)</span>
          </div>
          <div class="table-wrap">
            <table id="dataTable">
              <thead id="dataHead"></thead>
              <tbody id="dataBody"></tbody>
            </table>
          </div>
        </div>

        <div class="pane-resizer-vertical-custom" id="paneResizerV" title="上下拖曳調整表格與圖表高度分佈"></div>

        <div class="chart-pane" id="chartPane" style="flex: 1; display: flex; flex-direction: column;">
          <div class="pane-toolbar">
            <span>📈 統計圖表</span>
            <button class="icon-btn" id="btnPopoutChart" style="font-weight: bold; color: #8b5cf6;">🔲 彈出視窗</button>
          </div>
          <div class="chart-wrap">
            <div class="chart-controls">
              <label>X軸: <select id="chartX"></select></label>
              <label>Y軸: <select id="chartY"></select></label>
              <label class="check-item"><input type="checkbox" id="showTrendline"> 📈 一次擬合</label>
              <button id="btnDrawChart">📈 繪製圖表</button>
            </div>
            <div class="chart-canvas-container">
              <canvas id="logbookChart"></canvas>
            </div>
          </div>
        </div>

        <div class="logbook-report">
          <textarea id="reportText" placeholder="在此輸入您的實驗觀察、發現的規律或是結論報告 (右下角可拉動調整大小)..."></textarea>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
// ==========================================
// 1. 物理與畫布核心設定
// ==========================================
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

const Wcm = 20, Hcm = 16;
const TANK_DEPTH = 1;
const INIT_WATER_H = 10;
const baseLiquidArea = INIT_WATER_H * Wcm;
const ML_PER_AREA = TANK_DEPTH;
const TANK_CAPACITY_ML = Hcm * Wcm * ML_PER_AREA;

const S = {
  shape: 'square',
  density: 0.6, area: 30,
  rhoLiq: 1.0,
  forceScale: 1, showForce: false,
  pScale: 2.5, pDensity: 1, showObjP: false, showWallP: false,
  fixPos: false, viewScale: 1.1, damp: 3,
  cx: Wcm/2, cy: 9, vy: 0,
  dragging: false,
  manuallyPushedToBottom: false
};
const g = 400;
const PRESSURE_LEN_K = 10;

function radius(){ return Math.sqrt(S.area/Math.PI); }
function half(){ return Math.sqrt(S.area)/2; }
function objHalfH(){ return S.shape==='circle'? radius() : half(); }
function objHalfW(){ return S.shape==='circle'? radius() : half(); }

function submergedArea(cy, L){
  if(S.shape==='circle'){
    const r = radius(); let a = cy - L;
    if(a <= -r) return Math.PI*r*r;
    if(a >=  r) return 0;
    return r*r*Math.acos(a/r) - a*Math.sqrt(r*r - a*a);
  } else {
    const hh = half(), side = 2*hh, bottom = cy - hh;
    return side * Math.max(0, Math.min(side, L - bottom));
  }
}

function solveWaterHeight(){
  let wh = baseLiquidArea / Wcm;
  for(let i=0;i<10;i++) wh = (baseLiquidArea + submergedArea(S.cy, wh)) / Wcm;
  return wh;
}

function isAtBottom() {
  if (S.shape === 'circle') return false;
  return S.manuallyPushedToBottom && Math.abs(S.cy - objHalfH()) < 0.01;
}

function getBuoyancy(wh, sub) {
  return isAtBottom() ? 0 : (S.rhoLiq * sub);
}

function getLiquidColor(rho) {
  if (rho >= 13.0) return ['rgba(209,213,219,0.95)', 'rgba(107,114,128,0.98)'];
  if (rho >= 1.15) return ['rgba(253,230,138,0.45)', 'rgba(217,119,6,0.7)'];
  if (rho >= 0.95) return ['rgba(56,189,248,0.55)', 'rgba(14,116,200,0.75)'];
  if (rho >= 0.85) return ['rgba(252,211,77,0.55)', 'rgba(245,158,11,0.75)'];
  return ['rgba(207,250,254,0.45)', 'rgba(6,182,212,0.65)'];
}

let ppc = 20, originX = 0, originY = 0;
function computeView(){
  const marginV = 40, sideM = 40;
  const fit = Math.min((cv.width - 2*sideM)/Wcm, (cv.height - 2*marginV)/Hcm);
  ppc = fit * S.viewScale;
  originX = (cv.width - Wcm*ppc)/2;
  originY = (cv.height + Hcm*ppc)/2;
}
const X = x => originX + x*ppc;
const Y = y => originY - y*ppc;

function arrow(x1,y1,x2,y2,color,headLen=8,lw=2){
  const dx=x2-x1, dy=y2-y1, ang=Math.atan2(dy,dx);
  ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=lw;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(x2-headLen*Math.cos(ang-0.4), y2-headLen*Math.sin(ang-0.4));
  ctx.lineTo(x2-headLen*Math.cos(ang+0.4), y2-headLen*Math.sin(ang+0.4));
  ctx.closePath(); ctx.fill();
}
function pArrow(x1,y1,x2,y2,color){
  arrow(x1,y1,x2,y2,'rgba(255,255,255,0.92)',11,5.4);
  arrow(x1,y1,x2,y2,color,9,2.6);
}

const trendlineEquationPlugin = {
  id: 'trendlineEquationPlugin',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    chart.data.datasets.forEach((meta, index) => {
      if (meta.equationText && chart.isDatasetVisible(index)) {
        const metaData = chart.getDatasetMeta(index);
        if(metaData.data.length < 2) return;
        const p1 = metaData.data[0];
        const p2 = metaData.data[1];
        ctx.save();
        ctx.font = 'bold 12px sans-serif';
        ctx.textBaseline = 'top';
        const text = meta.equationText;
        const tw = ctx.measureText(text).width;
        const th = 14;
        let px = p1.x + (p2.x - p1.x) * 0.75;
        let py = p1.y + (p2.y - p1.y) * 0.75 - 20;
        if (px + tw + 8 > chart.chartArea.right) px = chart.chartArea.right - tw - 8;
        if (px < chart.chartArea.left + 4) px = chart.chartArea.left + 4;
        if (py + th + 8 > chart.chartArea.bottom) py = chart.chartArea.bottom - th - 8;
        if (py < chart.chartArea.top + 4) py = chart.chartArea.top + 4;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        ctx.beginPath();
        if (ctx.roundRect) {
            ctx.roundRect(px - 4, py - 4, tw + 8, th + 8, 4);
        } else {
            ctx.rect(px - 4, py - 4, tw + 8, th + 8);
        }
        ctx.fill();
        ctx.fillStyle = meta.borderColor;
        ctx.fillText(text, px, py);
        ctx.restore();
      }
    });
  }
};

function updateLogbookChart() {
  const xId = chartX.value; const yId = chartY.value;
  const xVar = logVars.find(v => v.id === xId);
  const yVar = logVars.find(v => v.id === yId);
  const showTrend = document.getElementById('showTrendline').checked;
  if(!xVar || !yVar || records.length === 0) {
    logChart.data.datasets = []; logChart.update(); return;
  }
  const groupedData = {};
  records.forEach(r => {
    const g = r.group || '未分組';
    if(!groupedData[g]) groupedData[g] = [];
    groupedData[g].push(r);
  });
  const datasets = [];
  let colorIndex = 0;
  Object.keys(groupedData).forEach(gName => {
    let sorted = groupedData[gName].sort((a,b) => a[xId] - b[xId]);
    let points = sorted.map(r => ({ x: r[xId], y: r[yId] }));
    let color = CHART_COLORS[colorIndex % CHART_COLORS.length];
    datasets.push({
      label: `${gName} (${yVar.label} vs ${xVar.label})`,
      data: points,
      backgroundColor: color, borderColor: color,
      borderWidth: 2, pointRadius: 5, pointHoverRadius: 8,
      showLine: false
    });
    if(showTrend && points.length > 1) {
      let n = points.length, sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
      points.forEach(p => { sumX += p.x; sumY += p.y; sumXY += p.x * p.y; sumXX += p.x * p.x; });
      let slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
      let intercept = (sumY - slope * sumX) / n;
      if(isFinite(slope)) {
        let minX = Math.min(...points.map(p=>p.x)), maxX = Math.max(...points.map(p=>p.x));
        let ext = (maxX - minX) * 0.1;
        let x1 = minX - ext < 0 ? 0 : minX - ext;
        let x2 = maxX + ext;
        let sign = intercept >= 0 ? '+' : '-';
        let eqStr = `y = ${slope.toFixed(2)}x ${sign} ${Math.abs(intercept).toFixed(2)}`;
        datasets.push({
          label: `${gName} 擬合線`,
          data: [{x: x1, y: slope * x1 + intercept}, {x: x2, y: slope * x2 + intercept}],
          borderColor: color, borderWidth: 2, borderDash: [5, 5],
          pointRadius: 0, showLine: true, fill: false,
          equationText: eqStr
        });
      }
    }
    colorIndex++;
  });
  logChart.data.datasets = datasets;
  logChart.options.scales.x.title.text = xVar.label;
  logChart.options.scales.y.title.text = yVar.label;
  logChart.update();
}

// 3. 物理與畫布模擬核心
// ==========================================
function drawScale(){
  ctx.save(); ctx.font = '11px sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for(let ml = 50; ml <= TANK_CAPACITY_ML + 0.5; ml += 50){
    const h = ml / (Wcm * ML_PER_AREA);
    if(h > Hcm + 0.001) break;
    const yp = Y(h), major = (ml % 100 === 0);
    ctx.strokeStyle = major ? '#075985' : '#7dd3fc'; ctx.lineWidth = major ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(X(0), yp); ctx.lineTo(X(0) + (major ? 18 : 10), yp); ctx.stroke();
    if(major){ ctx.fillStyle = '#1e3a5f'; ctx.fillText(ml + ' ml', X(0) - 4, yp); }
  }
  ctx.restore();
}

function draw(){
  computeView();
  ctx.clearRect(0,0,cv.width,cv.height);
  const wh = solveWaterHeight();
  ctx.fillStyle = '#eef6ff';
  ctx.fillRect(X(0), Y(Hcm), Wcm*ppc, Hcm*ppc);
  const whClamped = Math.min(wh, Hcm);
  const colors = getLiquidColor(S.rhoLiq);
  const grad = ctx.createLinearGradient(0, Y(whClamped), 0, Y(0));
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(1, colors[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(X(0), Y(whClamped), Wcm*ppc, whClamped*ppc);
  ctx.strokeStyle = colors[1]; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(X(0), Y(whClamped)); ctx.lineTo(X(Wcm), Y(whClamped)); ctx.stroke();
  if(wh > Hcm){
    ctx.fillStyle='#dc2626'; ctx.font='12px sans-serif';
    ctx.fillText('⚠ 水溢出容器', X(0)+24, Y(Hcm)+14);
  }
  ctx.strokeStyle = '#475569'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(X(0), Y(Hcm)); ctx.lineTo(X(0), Y(0));
  ctx.lineTo(X(Wcm), Y(0)); ctx.lineTo(X(Wcm), Y(Hcm)); ctx.stroke();
  drawScale();
  if(S.showWallP) drawWallPressure(wh);
  drawObject();
  if(S.showObjP) drawObjectPressure(wh);
  if(S.showForce) drawForces(wh);
  updateReadout(wh);
}

function drawObject(){
  if(S.density >= 19.0) ctx.fillStyle = 'rgba(251,191,36,0.9)';
  else if(S.density >= 7.0) ctx.fillStyle = 'rgba(100,116,139,0.9)';
  else if(S.density >= 2.0) ctx.fillStyle = 'rgba(203,213,225,0.9)';
  else ctx.fillStyle = 'rgba(163,83,30,0.9)';
  ctx.strokeStyle = '#451a03'; ctx.lineWidth = 2;
  if(S.shape==='circle'){
    const r = radius()*ppc;
    ctx.beginPath(); ctx.arc(X(S.cx), Y(S.cy), r, 0, 7); ctx.fill(); ctx.stroke();
  } else {
    const hh = half()*ppc;
    ctx.beginPath(); ctx.rect(X(S.cx)-hh, Y(S.cy)-hh, 2*hh, 2*hh); ctx.fill(); ctx.stroke();
  }
}

function drawObjectPressure(wh){
  const col = '#0d9488';
  const bottomFlag = isAtBottom();
  if(S.shape==='circle'){
    const r = radius(), perim = 2*Math.PI*r, N = Math.max(8, Math.round(perim * S.pDensity)), segLen = perim / N;
    for(let i=0;i<N;i++){
      const th = 2*Math.PI*i/N, px = S.cx + r*Math.cos(th), py = S.cy + r*Math.sin(th), depth = wh - py;
      if(depth <= 0) continue;
      if (bottomFlag && Math.sin(th) < -0.1) continue;
      const len = S.rhoLiq * depth * segLen * S.pScale * PRESSURE_LEN_K;
      pArrow(X(px)+Math.cos(th)*len, Y(py)-Math.sin(th)*len, X(px), Y(py), col);
    }
  } else {
    const hh = half(), side = 2*hh;
    const edges = [
      {n:[ 1,0], a:[S.cx+hh,S.cy-hh], b:[S.cx+hh,S.cy+hh]},
      {n:[-1,0], a:[S.cx-hh,S.cy-hh], b:[S.cx-hh,S.cy+hh]},
      {n:[0, 1], a:[S.cx-hh,S.cy+hh], b:[S.cx+hh,S.cy+hh]},
      {n:[0,-1], a:[S.cx-hh,S.cy-hh], b:[S.cx+hh,S.cy-hh]},
    ];
    const N = Math.max(2, Math.round(side * S.pDensity)), segLen = side / N;
    for(const e of edges){
      if(bottomFlag && e.n[1] === -1) continue;
      for(let i=0;i<N;i++){
        const t = (i+0.5)/N, px = e.a[0] + (e.b[0]-e.a[0])*t, py = e.a[1] + (e.b[1]-e.a[1])*t, depth = wh - py;
        if(depth <= 0) continue;
        const len = S.rhoLiq*depth*segLen*S.pScale*PRESSURE_LEN_K;
        pArrow(X(px)+e.n[0]*len, Y(py)-e.n[1]*len, X(px), Y(py), col);
      }
    }
  }
}

function drawWallPressure(wh){
  const col = '#f97316', whc = Math.min(wh, Hcm);
  const Nside = Math.max(2, Math.round(whc * S.pDensity)), segV = whc / Nside;
  for(let i=0;i<Nside;i++){
    const y = (i+0.5)*segV, len = S.rhoLiq*(wh - y)*segV*S.pScale*PRESSURE_LEN_K;
    pArrow(X(0)+len, Y(y), X(0), Y(y), col); pArrow(X(Wcm)-len, Y(y), X(Wcm), Y(y), col);
  }
  const Nb = Math.max(2, Math.round(Wcm * S.pDensity)), segH = Wcm / Nb, Pbot = S.rhoLiq * wh;
  for(let i=0;i<Nb;i++){
    const x = (i+0.5)*segH, len = Pbot*segH*S.pScale*PRESSURE_LEN_K;
    pArrow(X(x), Y(0)-len, X(x), Y(0), col);
  }
}

function drawForces(wh){
  const mass = S.density*S.area, sub = submergedArea(S.cy, wh);
  const W = mass;
  const B = getBuoyancy(wh, sub);
  const cxp = X(S.cx), cyp = Y(S.cy);
  const wEnd = W * S.forceScale * 10, bEnd = B * S.forceScale * 10;
  if(W>0) {
    arrow(cxp, cyp, cxp, cyp + wEnd, '#ef4444', 24, 3);
    ctx.beginPath(); ctx.moveTo(cxp, cyp); ctx.lineTo(cxp, cyp + Math.max(0, wEnd - 12));
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 6; ctx.stroke();
  }
  if(B>0) {
    arrow(cxp, cyp, cxp, cyp - bEnd, '#3b82f6', 24, 3);
    ctx.beginPath(); ctx.moveTo(cxp, cyp); ctx.lineTo(cxp, cyp - Math.max(0, bEnd - 12));
    ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 6; ctx.stroke();
  }
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#ef4444'; ctx.fillText('W='+W.toFixed(1)+' gw', cxp+22, cyp + Math.max(18, wEnd));
  ctx.fillStyle = '#3b82f6'; ctx.fillText('B='+B.toFixed(1)+' gw', cxp+22, cyp - Math.max(18, bEnd));
}

function physics(dt){
  if(S.dragging || S.fixPos){ S.vy = 0; return; }
  const wh = solveWaterHeight(), mass = S.density*S.area, sub = submergedArea(S.cy, wh);
  const Fnet = getBuoyancy(wh, sub) - mass, acc = (Fnet/mass)*g;
  S.vy += acc*dt; S.vy *= Math.exp(-S.damp*dt); S.cy += S.vy*dt;
  const minCy = objHalfH(), maxCy = Hcm - objHalfH();
  if(S.cy < minCy){ S.cy = minCy; if(S.vy<0) S.vy=0; }
  if(S.cy > maxCy){ S.cy = maxCy; if(S.vy>0) S.vy=0; }
}

function updateReadout(wh){
  const mass = S.density*S.area, sub = submergedArea(S.cy, wh), ratio = sub/S.area*100;
  document.getElementById('rSub').textContent = ratio.toFixed(0);
  document.getElementById('rW').textContent = mass.toFixed(1);
  document.getElementById('rB').textContent = getBuoyancy(wh, sub).toFixed(1);
  document.getElementById('rDisp').textContent = sub.toFixed(1);
  document.getElementById('rDispW').textContent = (S.rhoLiq * sub).toFixed(1);
  document.getElementById('rWH').textContent = (wh * Wcm * ML_PER_AREA).toFixed(0);
  document.getElementById('rDepth').textContent = Math.max(0, wh - (S.cy - objHalfH())).toFixed(2);
  const st = document.getElementById('rState');
  if (isAtBottom()) { st.textContent='沉底 (手動貼底無浮力)'; st.style.color='#f87171'; }
  else if(Math.abs(S.density - S.rhoLiq) < 0.02){ st.textContent='懸浮 (密度相近)'; st.style.color='#a78bfa'; }
  else if(S.density < S.rhoLiq){ st.textContent='漂浮'; st.style.color='#22c55e'; }
  else { st.textContent='下沉中'; st.style.color='#f87171'; }
}

// ==========================================
// 4. 事件綁定與控制
// ==========================================
function pointerPos(e){
  const r = cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height) };
}
function insideObject(px,py){
  const dx = (px - X(S.cx))/ppc, dy = (py - Y(S.cy))/(-ppc);
  if(S.shape==='circle') return Math.hypot(dx,dy) <= radius();
  return Math.abs(dx)<=half() && Math.abs(dy)<=half();
}
cv.addEventListener('pointerdown', e=>{
  const p = pointerPos(e);
  if(insideObject(p.x,p.y)){ S.dragging=true; S.vy=0; cv.setPointerCapture(e.pointerId); }
});
cv.addEventListener('pointermove', e=>{
  if(!S.dragging) return;
  const p = pointerPos(e);
  let nx = (p.x - originX)/ppc, ny = (originY - p.y)/ppc;
  S.cx = Math.max(objHalfW(), Math.min(Wcm-objHalfW(), nx));
  S.cy = Math.max(objHalfH(), Math.min(Hcm-objHalfH(), ny));
  S.vy = 0;
  if(Math.abs(S.cy - objHalfH()) < 0.01) S.manuallyPushedToBottom = true;
  else S.manuallyPushedToBottom = false;
});
cv.addEventListener('pointerup', ()=> S.dragging=false);
cv.addEventListener('pointercancel', ()=> S.dragging=false);

function syncUI(){
  const mass = S.density*S.area;
  document.getElementById('density').value = S.density;
  document.getElementById('area').value = S.area;
  document.getElementById('mass').value = mass;
  document.getElementById('liquid').value = S.rhoLiq;
  document.getElementById('forceScale').value = S.forceScale;
  document.getElementById('pScale').value = S.pScale;
  document.getElementById('pDensity').value = S.pDensity;
  document.getElementById('viewScale').value = S.viewScale;
  document.getElementById('dVal').textContent = S.density.toFixed(2)+' g/cm³';
  document.getElementById('aVal').textContent = S.area.toFixed(0)+' cm³';
  document.getElementById('mVal').textContent = mass.toFixed(1)+' g';
  document.getElementById('lVal').textContent = S.rhoLiq.toFixed(2)+' g/cm³';
  document.getElementById('fsVal').textContent = '×'+S.forceScale.toFixed(2);
  document.getElementById('psVal').textContent = '×'+S.pScale.toFixed(1);
  document.getElementById('pdVal').textContent = S.pDensity.toFixed(1);
  document.getElementById('vsVal').textContent = '×'+S.viewScale.toFixed(2);
}

document.getElementById('area').addEventListener('input', e=>{
  S.area = +e.target.value;
  let m = S.area * S.density;
  document.getElementById('mass').value = m;
  S.manuallyPushedToBottom = false;
  syncUI(); draw();
});
document.getElementById('mass').addEventListener('input', e=>{
  let m = +e.target.value;
  let v = m / S.density;
  if (v > 50) { v = 50; m = v * S.density; e.target.value = m; }
  if (v < 5) { v = 5; m = v * S.density; e.target.value = m; }
  S.area = v;
  document.getElementById('area').value = v;
  S.manuallyPushedToBottom = false;
  syncUI(); draw();
});
document.getElementById('density').addEventListener('input', e=>{
  let d = +e.target.value;
  let m = S.area * d;
  if (m > 1000) { m = 1000; d = m / S.area; e.target.value = d; }
  if (m < 0.5) { m = 0.5; d = m / S.area; e.target.value = d; }
  S.density = d;
  document.getElementById('mass').value = m;
  S.manuallyPushedToBottom = false;
  syncUI(); draw();
});

document.getElementById('liquid').addEventListener('input', e=>{ S.rhoLiq=+e.target.value; syncUI(); draw(); });
document.getElementById('forceScale').addEventListener('input', e=>{ S.forceScale=+e.target.value; syncUI(); draw(); });
document.getElementById('pScale').addEventListener('input', e=>{ S.pScale=+e.target.value; syncUI(); draw(); });
document.getElementById('pDensity').addEventListener('input', e=>{ S.pDensity=+e.target.value; syncUI(); draw(); });
document.getElementById('viewScale').addEventListener('input', e=>{ S.viewScale=+e.target.value; syncUI(); draw();});
document.getElementById('showForce').addEventListener('change', e=> {S.showForce=e.target.checked; draw();});
document.getElementById('showObjP').addEventListener('change', e=> {S.showObjP=e.target.checked; draw();});
document.getElementById('showWallP').addEventListener('change', e=> {S.showWallP=e.target.checked; draw();});
document.getElementById('fixPos').addEventListener('change', e=> S.fixPos=e.target.checked);
document.querySelectorAll('input[name=shape]').forEach(r=> r.addEventListener('change', e=> {S.shape=e.target.value; S.manuallyPushedToBottom=false; draw();}));
document.getElementById('reset').addEventListener('click', ()=>{ S.cx=Wcm/2; S.cy=9; S.vy=0; S.manuallyPushedToBottom=false; draw(); });

document.querySelectorAll('.liq-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    S.rhoLiq = parseFloat(e.target.dataset.rho); syncUI(); draw();
    document.getElementById('groupInput').value = e.target.innerText.split('(')[0];
  });
});
document.querySelectorAll('.obj-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    let d = parseFloat(e.target.dataset.rho);
    let m = S.area * d;
    if (m > 1000) { m = 1000; d = m / S.area; }

    S.density = d;
    document.getElementById('density').value = d;
    document.getElementById('mass').value = m;

function resize(){
  const wrap = cv.parentElement;
  if (cv.width !== wrap.clientWidth || cv.height !== wrap.clientHeight) {
      cv.width  = wrap.clientWidth;
      cv.height = wrap.clientHeight;
      return true;
  }
  return false;
}

const ro = new ResizeObserver(() => { if (resize()) draw(); });
ro.observe(document.getElementById('canvasWrap'));

const chartRo = new ResizeObserver(() => { if (logChart) logChart.resize(); });
chartRo.observe(document.querySelector('.chart-canvas-container'));

let last = performance.now();
function loop(now){
  let dt = Math.min((now-last)/1000, 0.03); last=now;
  physics(dt); draw(); requestAnimationFrame(loop);
}

// ==========================================
// ★★★ 新增：網址情境模式 (URL Preset) ★★★
// ==========================================
// 使用方式：在網址後面加上 ?q1、?q2 ... 即可。
// （?q1 / ?mode=q1 / ?=q1 這幾種寫法都能觸發）
//
// 每個情境可設定的欄位說明：
//   hidePanel  : true=隱藏左側控制面板
//   lockPanel  : true=連「☰ 開啟選單」按鈕也藏起來（完全鎖死，學生無法打開）
//   hideLogbook: true=隱藏「打開實驗記錄簿」按鈕與記錄簿
//   lines      : 要在實驗區浮層顯示哪幾項數據，可用的代號：
//                'lineState'  狀態(漂浮/沉底)
//                'lineDepth'  底面深度(cm)
//                'lineSub'    沒入比例
//                'lineW'      重力
//                'lineB'      浮力
//                'lineDisp'   排開液體體積
//                'lineDispW'  排開液體重量
//                'lineWH'     水位刻度(總水量)
//   showForce / showObjP / showWallP : true=自動勾選力箭頭 / 物體壓力 / 器壁壓力
//   density / rhoLiq / area / shape  : (可省略)指定初始物體密度、液體密度、體積、形狀('circle'或'square')
//
const PRESETS = {
  // ───────────────────────────────────────
  // Q1：深度 vs 浮力（反駁小明）
  // 圓形木塊放入水中，完全鎖死面板與記錄簿，學生只能拖曳。
  // 觀察：完全沒入後再往深處拖，排開體積與浮力都不變 → 與深度無關。
  // ───────────────────────────────────────
  q1: {
    hidePanel: true,
    lockPanel: true,
    hideLogbook: true,
    shape: 'circle',
    density: 0.6,
    rhoLiq: 1.0,
    lines: ['lineDepth', 'lineSub', 'lineDisp', 'lineB']
  },

  // ───────────────────────────────────────
  // Q2：全沒入後換液體（反駁小華）
  // 圓形鐵塊(7.8)會自動沉底並完全沒入。
  // 面板「只露出液體設定區」，且只保留 酒精/食用油/水/甘油 四顆按鈕、
  // 滑桿上限鎖在 1.26（水銀按鈕與水銀範圍都被擋掉）。
  // 觀察：沒入比例(100%)與排開體積不變，但換液體後浮力改變
  //       → 推翻「排開體積不變浮力就不變」，引出「液體密度也有影響」。
  // ───────────────────────────────────────
  q2: {
    hidePanel: false,
    hideLogbook: true,
    shape: 'circle',
    density: 0.6,
    rhoLiq: 1.0,
    lines: ['lineDepth', 'lineSub', 'lineDisp', 'lineB'],
    panel: {
      groups: ['liquid','object'],   
      liquidBtns: [0.79, 0.9, 1.0, 1.26],
      liquidMax: 1.26,
      object: ['volume','density']

    }
  },

  // ───────────────────────────────────────
  // Q3：浮力 = 排開液重（驗證小思）
  // 與 Q2 同設定，但多顯示「排開液重」欄。
  // 觀察：每種液體裡「浮力」與「排開液重」數值都相等 → 確認關係。
  // ───────────────────────────────────────
  q3: {
    hidePanel: false,
    hideLogbook: true,
    shape: 'circle',
    density: 7.8,
    rhoLiq: 1.0,
    lines: ['lineDisp', 'lineB', 'lineDispW'],
    panel: {
      groups: ['liquid'],
      liquidBtns: [0.79, 0.9, 1.0, 1.26, 13.6],
      liquidMax: 13.6
    }
  },

  // ───────────────────────────────────────
  // Q4：開放探究體積因素
  // 圓形鐵塊(7.8)在水中完全沒入，面板「只露出物體性質區的體積滑桿」。
  // 觀察：物體越大→排開體積越大→浮力(=排開液重)越大
  //       → 歸納出「物體體積（排開體積）」也是影響浮力的因素。
  // ───────────────────────────────────────
  q4: {
    hidePanel: false,
    hideLogbook: true,
    shape: 'circle',
    density: 7.8,
    rhoLiq: 1.0,
    lines: ['lineDisp', 'lineB', 'lineDispW'],
    panel: {
      groups: ['object'],
      object: ['volume']
    }
  }
};
  // 你可以照上面格式繼續往下新增 q4, q5 ...


function detectPreset(){
  const search = decodeURIComponent(window.location.search || '');
  // 寬鬆比對：只要查詢字串裡出現 preset 名稱就算命中
  for(const key of Object.keys(PRESETS)){
    // 用邊界比對避免 q1 誤中 q12 之類（先比長的）
  }
  // 依名稱長度由長到短比對，避免 q1 搶先吃掉 q10
  const keys = Object.keys(PRESETS).sort((a,b)=> b.length - a.length);
  for(const key of keys){
    const re = new RegExp('(^|[?&=])' + key + '($|[&=])');
    if(re.test(search)) return key;
  }
  return null;
}
// ★★★ 新增：面板逐欄 / 逐列鎖定 ★★★
// 在 PRESET 裡用 panel: {...} 控制。所有清單都是「白名單」(列出來的才顯示)。
//   groups     : 要顯示哪些「整塊」區域，代號：
//                'object'(物體性質) 'liquid'(液體設定) 'force'(力箭頭)
//                'pressure'(壓力箭頭) 'status'(狀態欄) 'other'(其他設定)
//   object     : 物體性質區內要顯示哪幾「列」，代號：
//                'shape'(形狀) 'density'(密度滑桿) 'densityBtns'(材質按鈕)
//                'volume'(體積滑桿) 'mass'(質量滑桿)
//   liquidBtns : 液體預設按鈕只保留哪幾顆(用密度數字)，例如 [0.79,0.9,1.0,1.26]
//   liquidMax  : 把液體密度滑桿的上限改成此值(防止學生拖到水銀)
function applyPanelConfig(p){
  if(!p) return;

  const groupEls = {
    object:   document.getElementById('density').closest('.group'),
    liquid:   document.getElementById('liquid').closest('.group'),
    force:    document.getElementById('showForce').closest('.group'),
    pressure: document.getElementById('showObjP').closest('.group'),
    status:   document.querySelector('input[data-line]').closest('.group'),
    other:    document.getElementById('fixPos').closest('.group')
  };

  // 1) 整塊區域顯示/隱藏
  if(p.groups){
    Object.keys(groupEls).forEach(k=>{
      groupEls[k].style.display = p.groups.includes(k) ? '' : 'none';
    });
  }

  // 2) 物體性質區內，逐列顯示/隱藏
  if(p.object){
    const rows = {
      shape:       document.querySelector('.shape'),
      density:     document.getElementById('density').closest('.row'),
      densityBtns: document.querySelector('.obj-btn').closest('.preset-btns'),
      volume:      document.getElementById('area').closest('.row'),
      mass:        document.getElementById('mass').closest('.row')
    };
    Object.keys(rows).forEach(k=>{
      rows[k].style.display = p.object.includes(k) ? '' : 'none';
    });
  }

  // 3) 液體預設按鈕逐顆過濾
  if(p.liquidBtns){
    document.querySelectorAll('.liq-btn').forEach(btn=>{
      const rho = parseFloat(btn.dataset.rho);
      btn.style.display = p.liquidBtns.includes(rho) ? '' : 'none';
    });
  }

  // 4) 限制液體密度滑桿上限
  if(p.liquidMax !== undefined){
    document.getElementById('liquid').max = p.liquidMax;
  }
}
function applyPreset(name){
  const cfg = PRESETS[name];
  if(!cfg) return;

  // 1) 左側控制面板（整片顯示/隱藏）
  if(cfg.hidePanel){
    panel.classList.add('collapsed');
    panelShow.style.display = cfg.lockPanel ? 'none' : 'block';
  }

  // 1b) ★ 新增：面板逐欄/逐列鎖定
  if(cfg.panel) applyPanelConfig(cfg.panel);

  // 2) 實驗記錄簿
  if(cfg.hideLogbook){
    btnToggleLogbook.style.display = 'none';
    logbookPanel.style.display = 'none';
  }

  // 3) 物理 / 初始參數（須在 syncUI 之前設定）
  if(cfg.shape){
    S.shape = cfg.shape;
    const radio = document.querySelector(`input[name=shape][value="${cfg.shape}"]`);
    if(radio) radio.checked = true;
  }
  if(cfg.density !== undefined) S.density = cfg.density;
  if(cfg.rhoLiq  !== undefined) S.rhoLiq  = cfg.rhoLiq;
  if(cfg.area    !== undefined) S.area    = cfg.area;

  // 4) 箭頭顯示
  if(cfg.showForce !== undefined){ S.showForce = cfg.showForce; document.getElementById('showForce').checked = cfg.showForce; }
  if(cfg.showObjP  !== undefined){ S.showObjP  = cfg.showObjP;  document.getElementById('showObjP').checked  = cfg.showObjP; }
  if(cfg.showWallP !== undefined){ S.showWallP = cfg.showWallP; document.getElementById('showWallP').checked = cfg.showWallP; }

  // 5) 狀態浮層要顯示的數據
  if(cfg.lines){
    lineChecks.forEach(c => { c.checked = cfg.lines.includes(c.dataset.line); });
    applyLineVisibility();
  }

  syncUI();
  draw();
}

window.onload = () => {
  lineChecks.forEach(c => c.checked = false);
  initLogbookUI();
  resize(); syncUI(); applyLineVisibility();

  // ★ 套用網址情境模式（若沒有對應參數則維持原本預設行為）
  const preset = detectPreset();
  if(preset) applyPreset(preset);

  requestAnimationFrame(loop);
};

const chartPane = document.getElementById('chartPane');
const btnPopoutChart = document.getElementById('btnPopoutChart');

btnPopoutChart.addEventListener('click', () => {
  const isPopout = chartPane.classList.toggle('popout');
  if (isPopout) {
    btnPopoutChart.textContent = "📌 釘回原處";
    btnPopoutChart.style.color = "#ef4444";
    chartPane.style.top = "15vh";
    chartPane.style.left = "40vw";
    chartPane.style.width = "550px";
    chartPane.style.height = "450px";
    chartPane.style.display = "flex";
  } else {
    btnPopoutChart.textContent = "🔲 彈出視窗";
    btnPopoutChart.style.color = "#8b5cf6";
    chartPane.style.top = "";
    chartPane.style.left = "";
    chartPane.style.width = "";
    chartPane.style.height = "";
  }
  setTimeout(() => { if (logChart) logChart.resize(); }, 100);
});

const chartHeader = chartPane.querySelector('.pane-toolbar');
let isWindowDragging = false;
let startMouseX, startMouseY;
let startWinLeft, startWinTop;

chartHeader.addEventListener('mousedown', (e) => {
  if (!chartPane.classList.contains('popout')) return;
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
  isWindowDragging = true;
  document.body.style.userSelect = 'none';
  startMouseX = e.clientX;
  startMouseY = e.clientY;
  const rect = chartPane.getBoundingClientRect();
  startWinLeft = rect.left;
  startWinTop = rect.top;
  chartPane.classList.add('no-transition');
});

document.addEventListener('mousemove', (e) => {
  if (!isWindowDragging) return;
  let dx = e.clientX - startMouseX;
  let dy = e.clientY - startMouseY;
  chartPane.style.left = `${startWinLeft + dx}px`;
  chartPane.style.top = `${startWinTop + dy}px`;
});

document.addEventListener('mouseup', () => {
  if (isWindowDragging) {
    isWindowDragging = false;
    document.body.style.userSelect = 'auto';
    chartPane.classList.remove('no-transition');
  }
});
